<!-- COMPONENT: nexus-title -->
<!-- EDITABLE: Company name, date/subtitle, company image on right panel -->
<div class="slide active" style="padding: 0; position: relative; overflow: hidden;">
  <!-- Right: client image area (replace with company photo) -->
  <div style="position: absolute; top: 0; right: 0; bottom: 0; width: 58%; background: linear-gradient(160deg, #3a5a4a 0%, #2a4a3a 50%, #1a3a2a 100%); overflow: hidden;">
    <!-- Color overlay + texture -->
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(160deg, rgba(31,61,46,0.35) 0%, rgba(26,63,107,0.25) 50%, rgba(15,45,77,0.4) 100%); z-index: 1;"></div>
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); z-index: 2;"></div>
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 30% 30%, var(--white-15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(0,0,0,0.2) 0%, transparent 50%); z-index: 3;"></div>
    <!-- Nexus logo watermark -->
    <div style="position: absolute; bottom: 40px; right: 40px; z-index: 4;">
      <img src="../assets/nexus-logo-white.svg" alt="Nexus" style="height: 40px; opacity: 0.25;">
    </div>
    <!-- Template identifier -->
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 4;">
      <div style="font-family: var(--display); font-size: 48px; color: rgba(255,255,255,0.3); line-height: 1;">Small</div>
      <div style="font-family: var(--display); font-size: 48px; color: rgba(255,255,255,0.3); line-height: 1; margin-top: 4px;">Group</div>
      <div style="font-size: 14px; color: rgba(184,82,42,0.6); letter-spacing: 4px; text-transform: uppercase; margin-top: 12px; font-weight: 600;">Renewal</div>
      <div style="font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 2px; text-transform: uppercase; margin-top: 8px;">w/ Amaze Biomed</div>
    </div>
  </div>
  <!-- Rust stripe with shadow -->
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; filter: drop-shadow(4px 0 8px rgba(0,0,0,0.4));"><div style="width: 100%; height: 100%; background: var(--rs); clip-path: polygon(57% 0, 59.2% 0, 43% 100%, 40.8% 100%);"></div></div>
  <!-- Green panel with shadow -->
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11; filter: drop-shadow(4px 0 6px rgba(0,0,0,0.35));"><div style="position: absolute; top: 0; left: 0; width: 58%; height: 100%; background: var(--df); background-image: radial-gradient(ellipse at top left, rgba(184,82,42,0.2) 0%, transparent 35%); clip-path: polygon(0 0, 100% 0, 72% 100%, 0 100%);"></div></div>
  <!-- Left: text content -->
  <div style="position: relative; width: 58%; height: 100%; padding: 44px 64px; display: flex; flex-direction: column; justify-content: center; z-index: 12;">
    <div>
      <div style="width: 48px; height: 2px; background: var(--rs); margin-bottom: 20px;"></div>
      <div style="font-family: var(--display); font-size: 32px; color: #FFFFFF; line-height: 1.2; margin-bottom: 4px;">Benefits Strategy</div>
      <div style="font-family: var(--display); font-size: 28px; color: #FFFFFF; line-height: 1.2; margin-bottom: 6px;">&amp; Renewal Analysis</div>
      <div style="font-family: var(--display); font-size: 22px; color: var(--rl); line-height: 1.3; margin-bottom: 14px;">for [Company Name]</div>
      <div style="font-size: 13px; color: var(--white-45);">Prepared for [Renewal Date]</div>
    </div>
